<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Chess-o-Matic</title>
    <style>
      body > div {
        margin: 10px;
      }

      .board {
        width: 500px;
        height: 500px;
      }

      .cg-board {
        background-color: #bfcfdd;
      }
    </style>
  </head>
  <body>
    <h1>Chess-o-Matic</h1>
    <p>Recognize chess moves using speech recognition</p>

    <div class="board" id="board">BOARD</div>

    <div id="input">
      INPUT
    </div>
    <div id="pgn">
      PGN
    </div>

    <hr>
    <button id="startBtn">Start1</button>
    <button id="stopBtn">Stop</button>
    <hr />
    <script type="module">
      import { init, exit } from "./index.ts";

      const board = document.getElementById("board");
      const input = document.getElementById("input");
      const pgn = document.getElementById("pgn");
      const startBtn = document.getElementById("startBtn");
      const stopBtn = document.getElementById("stopBtn");



      startBtn.addEventListener("click", async () => init(board, input, pgn));
      stopBtn.addEventListener("click", exit);
    </script>
  </body>
</html>
