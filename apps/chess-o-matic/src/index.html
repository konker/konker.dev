<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Chess-o-Matic</title>
    <style>
      body > div {
        margin: 10px;
      }

      .boardWrapper {
        width: 500px;
        height: 500px;
      }


    </style>
  </head>
  <body>
    <h1>Chess-o-Matic</h1>
    <p>Recognize chess moves using speech recognition</p>

    <div class="boardWrapper" id="boardWrapper">BOARD</div>

    <div id="input">
      INPUT
    </div>
    <div id="pgn">
      PGN
    </div>

    <hr>
<!--    <button id="startBtn">Start1</button>-->
    <button id="stopBtn">Stop</button>
    <button id="tickBtn">tick</button>
    <hr />
    <script type="module">
      import { init, exit, tick } from "./index.ts";

      const boardWrapper = document.getElementById("boardWrapper");
      const input = document.getElementById("input");
      const pgn = document.getElementById("pgn");
      // const startBtn = document.getElementById("startBtn");
      const stopBtn = document.getElementById("stopBtn");
      const tickBtn = document.getElementById("tickBtn");



      // startBtn.addEventListener("click", async () => init(boardWrapper, input, pgn));
      stopBtn.addEventListener("click", exit);
      tickBtn.addEventListener('click', () => tick('e4'));

      // Expose to browser console
      window.tick = tick;

      init(boardWrapper, input, pgn)
    </script>
  </body>
</html>
